appId: pt.charroco.batidadosado
productName: Batida do Sado

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - public/**/*
  - package.json

asar: true

mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - universal
        - arm64
  icon: public/icon.icns
  artifactName: "${productName}-${version}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64
  icon: public/icon.ico
  artifactName: "${productName}-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-Setup-${version}-${arch}.${ext}"

portable:
  artifactName: "${productName}-Portable-${version}-${arch}.${ext}"

linux:
  category: AudioVideo
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  icon: public
  artifactName: "${productName}-${version}-${arch}.${ext}"

deb:
  packageName: deemix-app