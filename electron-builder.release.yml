appId: com.charroco.batidadosado
productName: Batida do Sado
directories:
  output: dist
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true

mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - universal
        - arm64
  artifactName: "${productName}-${version}-${arch}.${ext}"
  icon: public/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-${arch}.${ext}"
  icon: public/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-Setup-${version}-${arch}.${ext}"

portable:
  artifactName: "${productName}-Portable-${version}-${arch}.${ext}"

linux:
  category: AudioVideo
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-${arch}.${ext}"
  icon: public

deb:
  packageName: deemix-app
