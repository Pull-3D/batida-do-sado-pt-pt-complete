<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradC1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E"/>
      <stop offset="100%" style="stop-color:#2D2D44"/>
    </linearGradient>
    <linearGradient id="gradC2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#FF006E"/>
    </linearGradient>
    <linearGradient id="vinylShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#gradC1)"/>

  <!-- Outer ring - neon glow effect -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gradC2)" stroke-width="8"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gradC2)" stroke-width="16" opacity="0.3"/>

  <!-- Vinyl grooves -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#3a3a4a" stroke-width="1"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#3a3a4a" stroke-width="1"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#3a3a4a" stroke-width="1"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#3a3a4a" stroke-width="1"/>

  <!-- Center label area -->
  <circle cx="256" cy="256" r="80" fill="url(#gradC2)"/>
  <circle cx="256" cy="256" r="75" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Center spindle -->
  <circle cx="256" cy="256" r="12" fill="#1E1E2E"/>
  <circle cx="256" cy="256" r="8" fill="url(#gradC2)"/>

  <!-- "R" for Remastered in center -->
  <text x="256" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">R</text>

  <!-- Digital waveform arc -->
  <g stroke="url(#gradC2)" stroke-width="4" fill="none" opacity="0.8">
    <path d="M140 380 Q180 350 190 380 Q200 410 220 380 Q240 350 256 380 Q272 410 292 380 Q312 350 332 380 Q352 410 372 380"/>
  </g>

  <!-- Shine overlay -->
  <ellipse cx="180" cy="180" rx="120" ry="80" fill="url(#vinylShine)" transform="rotate(-45 180 180)"/>

  <!-- Download indicator -->
  <g transform="translate(256, 420)">
    <path d="M0 0 L0 35" stroke="#00D9FF" stroke-width="6" stroke-linecap="round"/>
    <path d="M-15 20 L0 35 L15 20" stroke="#00D9FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
