<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#gradB)"/>

  <!-- Subtle inner glow -->
  <rect x="48" y="48" width="416" height="416" rx="88" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Music note - stylized and modern -->
  <g fill="white" filter="url(#glow)">
    <!-- Note head 1 -->
    <ellipse cx="180" cy="340" rx="50" ry="40" transform="rotate(-20 180 340)"/>
    <!-- Note head 2 -->
    <ellipse cx="320" cy="300" rx="50" ry="40" transform="rotate(-20 320 300)"/>
    <!-- Stems -->
    <rect x="218" y="120" width="16" height="220" rx="8"/>
    <rect x="358" y="80" width="16" height="220" rx="8"/>
    <!-- Beam -->
    <path d="M226 120 L366 80 L366 110 L226 150 Z" />
  </g>

  <!-- Download indicator - arrow pointing down -->
  <g stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M256 400 L256 460"/>
    <path d="M230 435 L256 460 L282 435"/>
  </g>

  <!-- Accent dots -->
  <circle cx="420" cy="100" r="12" fill="white" opacity="0.4"/>
  <circle cx="100" cy="420" r="8" fill="white" opacity="0.3"/>
</svg>
