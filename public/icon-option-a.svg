<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradA)"/>

  <!-- Inner shadow/depth -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>

  <!-- Stylized "D" shape -->
  <path d="M160 120 L160 392 L260 392 C340 392 400 320 400 256 C400 192 340 120 260 120 Z"
        fill="none" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Audio waveform bars inside the D -->
  <g fill="url(#waveGrad)">
    <rect x="200" y="200" width="16" height="112" rx="8"/>
    <rect x="230" y="170" width="16" height="172" rx="8"/>
    <rect x="260" y="190" width="16" height="132" rx="8"/>
    <rect x="290" y="160" width="16" height="192" rx="8"/>
    <rect x="320" y="185" width="16" height="142" rx="8"/>
  </g>

  <!-- Download arrow accent -->
  <path d="M256 420 L256 450 M240 435 L256 450 L272 435"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
